{{- if .Values.ingressRoute.backendMgmt.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ei-backend-mgmt-ipallowlist
spec:
  ipAllowList:
    sourceRange:
      {{- range .Values.ingressRoute.backendMgmt.allowedIPs }}
      - {{ . | quote }}
      {{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ei-backend-mgmt-stripprefix
spec:
  stripPrefix:
    prefixes:
      - /ei-backend
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ei-backend-mgmt
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.ingressroute.bksHostName }}`) && PathPrefix(`/ei-backend/`)
      kind: Rule
      middlewares:
        - name: ei-backend-mgmt-ipallowlist
        - name: ei-backend-mgmt-stripprefix
      services:
        - name: ei-backend
          port: 8083
{{- end }}
