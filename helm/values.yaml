repository: docker.drift.inera.se/ntjp/

container:
  backend:
    image:
      tag: # Override to supply another image tag to run
      pullPolicy: Always
  frontend:
    image:
      tag: # Override to supply another image tag to run
      pullPolicy: Always

# Environment-specific backwards-compatible service name
vip:
  name: default-ei-vip

queues:
  prefix: # Override to apply common queue naming

deployments:
  backend:
    replicaCount: 1
    elasticGrokFilter: camel
  frontend:
    replicaCount: 1
    elasticGrokFilter: camel

backend_resources:
  limits:
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 1Gi

frontend_resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 75m
    memory: 512Mi

# --- Shared configuration (used by both backend and frontend) ---

paths:
  loggingConfig: /etc/ei/log4j2.xml

ei:
  hsaId: "5565594230"

vp:
  hsaId: "5565594230"

skltp:
  instanceId: -999 # placeholder to allow local chart templating.

activemq:
  broker:
    url: "failover:(tcp://ei-amq:61616)?randomize=false&timeout=10000&jms.prefetchPolicy.queuePrefetch=5"
    maximumRedeliveries: "5"
    redeliveryDelay: "60000"
    useExponentialBackoff: "false"

management:
  endpointsWebExposureInclude: "health,prometheus"
  endpointPrometheusEnabled: "true"

# --- Backend-specific configuration ---

backend:
  server:
    port: "8881"
  findContent:
    webserviceUrl: "http://0.0.0.0:8082/skltp-ei/find-content-service/v1"
  getLogicalAddresses:
    serviceEndpointUrl: "http://vp:8080/vp/infrastructure/itintegration/registry/GetLogicalAddresseesByServiceContract/2/rivtabp21"
    connectTimeoutMs: "5000"
    requestTimeoutMs: "5000"
  processNotification:
    serviceEndpointUrl: "http://vp:8080/vp/ProcessNotification/1/rivtabp21"
  subscriberCache:
    fileName: /tmp/ei.localCache3
    timeToLiveSeconds: "30000"
    resetUrl: "http://0.0.0.0:8083/skltp-ei/resetcache"
    statusUrl: "http://0.0.0.0:8083/skltp-ei/subscriber/status"
  statusUrl: "http://0.0.0.0:8083/skltp-ei-backend/status"
  writelock:
    enableUrl: "http://0.0.0.0:8083/skltp-ei/writelock/enable"
    disableUrl: "http://0.0.0.0:8083/skltp-ei/writelock/disable"
    statusUrl: "http://0.0.0.0:8083/skltp-ei/writelock/status"
  datasource:
    url: "jdbc:mysql://localhost:3306/ei_test_amq?serverTimezone=Europe/Stockholm"
    driverClassName: "com.mysql.cj.jdbc.Driver"
    jpa:
      databasePlatform: "org.hibernate.dialect.MySQL8Dialect"
      hibernateDdlAuto: "update"
  activemq:
    broker:
      notificationMaximumRedeliveries: "8"
      notificationRedeliveryDelay: "60000"
      notificationUseExponentialBackoff: "true"
      notificationBackoffMultiplier: "2"
      notificationMaximumRedeliveryDelay: "900000"

# --- Frontend-specific configuration ---

frontend:
  server:
    port: "8882"
  update:
    webserviceUrl: "http://0.0.0.0:8081/skltp-ei/update-service/v1"
  processNotification:
    webserviceUrl: "http://0.0.0.0:8081/skltp-ei/notification-service/v1"
  statusUrl: "http://0.0.0.0:8084/skltp-ei-frontend/status"
  updateNotification:
    notAllowedHsaidList: "5565594230"

# --- Environment variable sources ---

environment:
  backend:
    _default_config_maps:
      - ei-backend-configmap-default
    config_maps:
      # Override to supply your own maps.
    secrets:
      # Override to supply your own secrets.
  frontend:
    _default_config_maps:
      - ei-frontend-configmap-default
    config_maps:
      # Override to supply your own maps.
    secrets:
      # Override to supply your own secrets.

log4j:
  loggers:
    - name: se.skltp.ei
      level: INFO
    - name: se.skltp.ei.subscriber
      level: INFO
    - name: se.skltp.ei.service.GetLogicalAddresseesServiceClient
      level: WARN
    - name: se.skltp.ei.EiApplication
      level: INFO
    - name: eiBackendLog
      level: INFO
    - name: eiFrontendLog
      level: INFO
    - name: org.apache.camel
      level: INFO
  rootLoggerLevel: WARN

probes_backend:
  startupProbe:
    httpGet:
      path: actuator/health/readiness
      port: actuators
      scheme: HTTP
    initialDelaySeconds: 30
    periodSeconds: 5  # 30s initial + 9 failures * 5s period = 75 seconds max startup before failure and restart.
    timeoutSeconds: 4
    successThreshold: 1
    failureThreshold: 9
  livenessProbe:
    httpGet:
      path: actuator/health/liveness
      port: actuators
      scheme: HTTP
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    # 3x 10s + 5s timeout allows for up to 45 seconds of non-responsiveness before pod kill-and-restart.
    #    Earliest kill possible 55 seconds after startup completes.
    failureThreshold: 4
    successThreshold: 1
  readinessProbe:
    httpGet:
      path: actuator/health/readiness
      port: actuators
      scheme: HTTP
    # lower initial delay than liveness, but same period, allows traffic to be governed before liveness is tested.
    initialDelaySeconds: 9
    periodSeconds: 10
    timeoutSeconds: 5
    # 1x 10s + timeout 5s allows for up to 15 seconds on non-response before traffic is cut from pod.
    #    Earliest cut possible 24 seconds after startup completes.
    failureThreshold: 1
    successThreshold: 1

probes_frontend:
  startupProbe:
    httpGet:
      path: actuator/health/readiness
      port: 8882
      scheme: HTTP
    initialDelaySeconds: 20
    periodSeconds: 5  # 20s initial + 9 failures * 5s period = 65 seconds max startup before failure and restart.
    timeoutSeconds: 4
    successThreshold: 1
    failureThreshold: 9
  livenessProbe:
    httpGet:
      path: actuator/health/liveness
      port: actuators
      scheme: HTTP
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    # 3x 10s + 5s timeout allows for up to 45 seconds of non-responsiveness before pod kill-and-restart.
    #    Earliest kill possible 55 seconds after startup completes.
    failureThreshold: 4
    successThreshold: 1
  readinessProbe:
    httpGet:
      path: actuator/health/readiness
      port: actuators
      scheme: HTTP
    # lower initial delay than liveness, but same period, allows traffic to be governed before liveness is tested.
    initialDelaySeconds: 9
    periodSeconds: 10
    timeoutSeconds: 5
    # 1x 10s + timeout 5s allows for up to 15 seconds on non-response before traffic is cut from pod.
    #    Earliest cut possible 24 seconds after startup completes.
    failureThreshold: 1
    successThreshold: 1